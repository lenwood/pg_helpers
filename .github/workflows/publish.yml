name: Publish to PyPI

# Publish whenever a GitHub Release is published. This matches the existing
# release process (tag + GitHub Release), so cutting a release is all that's
# needed to ship to PyPI -- no manual `twine upload` step.
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Build both sdist and wheel using the same tooling used locally.
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      # Hand the artifacts to the publish job via an artifact upload so the
      # publish job runs in its own environment with only id-token permission.
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted publishing (OIDC) requires the job to mint an id-token. No PyPI
    # token/secret is stored anywhere -- PyPI verifies the request against the
    # publisher configured for this repo/workflow.
    permissions:
      id-token: write
    # The environment name must match the one configured on the PyPI publisher.
    environment:
      name: pypi
      url: https://pypi.org/project/pg-helpers/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
